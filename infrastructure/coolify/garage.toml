# Garage object storage configuration (S3-compatible).
# Mounted read-only into the planix-garage container. See ARCHITECTURE.md.
# Replace rpc_secret with a value from `openssl rand -hex 32` stored in Coolify.

metadata_dir = "/var/lib/garage/meta"
data_dir = "/var/lib/garage/data"
db_engine = "lmdb"

replication_factor = 1

rpc_bind_addr = "[::]:3901"
rpc_secret = "REPLACE_WITH_OPENSSL_RAND_HEX_32"

[s3_api]
s3_region = "garage"
api_bind_addr = "[::]:3900"
root_domain = ".s3.garage.local"

[admin]
api_bind_addr = "[::]:3903"
admin_token = "REPLACE_WITH_ADMIN_TOKEN"
