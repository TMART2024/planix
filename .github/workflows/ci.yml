# Planix CI (GitHub Actions).
#
# Source lives on GitHub; Coolify handles deployment from GitHub push (wired
# later). This workflow is the CI quality gate only — it does NOT deploy. It
# runs the three Phase 0 checks:
#   1. TypeScript compiler check (tsc --noEmit) across all workspaces
#   2. Linter (eslint) across all workspaces
#   3. Database migration runner (apply up, then verify rollback)
#
# It stays dormant until the repo is pushed to GitHub.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck-lint:
    name: Typecheck + Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint

  migrations:
    name: Migrations (up + rollback)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: planix
          POSTGRES_PASSWORD: planix
          POSTGRES_DB: planix
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U planix"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://planix:planix@localhost:5432/planix
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - name: Apply migrations (up)
        run: npm run migrate
      - name: Show status
        run: npm run migrate:status
      - name: Verify rollback (reversible migrations)
        run: |
          npm run migrate:rollback
          npm run migrate:rollback
